services:
  mongo:
    image: mongo:7
    container_name: ai-task-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh --quiet
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: ai-task-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ai-task-backend
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      NODE_ENV: development
      PORT: 5000
      MONGO_URI: mongodb://mongo:27017/ai_task_platform
      REDIS_HOST: redis
      REDIS_PORT: 6379
      QUEUE_NAME: ai-tasks
      JWT_SECRET: dev_jwt_secret_change_me
      JWT_EXPIRES_IN: 7d
      CLIENT_ORIGIN: http://localhost:8080,http://localhost:5173
      INTERNAL_API_KEY: dev_internal_key_change_me
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    build:
      context: ./worker
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      REDIS_HOST: redis
      REDIS_PORT: 6379
      QUEUE_NAME: ai-tasks
      MONGO_URI: mongodb://mongo:27017/ai_task_platform
      BACKEND_API_URL: http://backend:5000/api
      INTERNAL_API_KEY: dev_internal_key_change_me
      WORKER_CONCURRENCY: 2
    depends_on:
      - backend
      - redis
    deploy:
      replicas: 2

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: http://localhost:5000/api
        VITE_SOCKET_URL: http://localhost:5000
    container_name: ai-task-frontend
    restart: unless-stopped
    ports:
      - "8080:8080"
    depends_on:
      - backend

volumes:
  mongo-data:
